/* ═══════════════════════════════════════════════
SESSION MANAGER (UUID v4 + localStorage + cookie)
Реализует требования раздела 27 ТЗ
═══════════════════════════════════════════════ */
window.SessionManager = (function() {
var SESSION_KEY = 'chrome_session_id';
var PROFILE_KEY = 'chrome_profile';
var HISTORY_KEY = 'chrome_history';

/* UUID v4 генерация — высокая энтропия */
function generateUUID() {
if (typeof crypto !== 'undefined' && crypto.randomUUID) {
return crypto.randomUUID();
}
/* Фоллбэк для старых браузеров */
return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
var r = Math.random() * 16 | 0;
var v = c === 'x' ? r : (r & 0x3 | 0x8);
return v.toString(16);
});
}

function validateUUID(id) {
return /^[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(id);
}

/* Чтение из cookie */
function getCookie(name) {
try {
var m = document.cookie.match(new RegExp('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)'));
return m ? m[2] : null;
} catch(e) { return null; }
}

/* Запись в cookie (90 дней) */
function setCookie(name, value) {
try {
var d = new Date();
d.setTime(d.getTime() + 90 * 24 * 60 * 60 * 1000);
document.cookie = name + '=' + value + ';expires=' + d.toUTCString() + ';path=/;SameSite=Strict';
} catch(e) {}
}

/* Получить или создать session_id */
function getOrCreate() {
var id = null;
/* 1. Пробуем localStorage (primary) */
try { id = localStorage.getItem(SESSION_KEY); } catch(e) {}
/* 2. Фоллбэк на cookie */
if (!id || !validateUUID(id)) {
id = getCookie(SESSION_KEY);
}
/* 3. Если нет или невалидный — создаём новый */
if (!id || !validateUUID(id)) {
id = generateUUID();
}
/* Сохраняем везде */
try { localStorage.setItem(SESSION_KEY, id); } catch(e) {}
setCookie(SESSION_KEY, id);
return id;
}

/* Заголовок для будущих API запросов */
function getHeaders() {
return { 'X-Session-Id': getOrCreate() };
}

/* Сохранить профиль (цветотип + дата) */
function saveProfile(seasonId) {
var profile = {
season_id: seasonId,
set_at: new Date().toISOString(),
session_id: getOrCreate()
};
try { localStorage.setItem(PROFILE_KEY, JSON.stringify(profile)); } catch(e) {}
return profile;
}

function loadProfile() {
try {
var raw = localStorage.getItem(PROFILE_KEY);
return raw ? JSON.parse(raw) : null;
} catch(e) { return null; }
}

/* Сохранить историю */
function saveHistory(items) {
try { localStorage.setItem(HISTORY_KEY, JSON.stringify(items)); } catch(e) {}
}

function loadHistory() {
try {
var raw = localStorage.getItem(HISTORY_KEY);
return raw ? JSON.parse(raw) : [];
} catch(e) { return []; }
}

/* Удалить все данные сессии (требование 27.9) */
function clearAll() {
try {
localStorage.removeItem(SESSION_KEY);
localStorage.removeItem(PROFILE_KEY);
localStorage.removeItem(HISTORY_KEY);
} catch(e) {}
/* Очищаем cookie */
try {
document.cookie = SESSION_KEY + '=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/';
} catch(e) {}
/* Генерируем новый session_id */
return getOrCreate();
}

/* Инициализация сессии (заглушка для будущего POST /session/init) */
function init() {
var id = getOrCreate();
/* Здесь можно подключить backend:
fetch('/session/init', {
method: 'POST',
headers: { 'X-Session-Id': id }
})
*/
return id;
}

return {
init: init,
getId: getOrCreate,
getHeaders: getHeaders,
saveProfile: saveProfile,
loadProfile: loadProfile,
saveHistory: saveHistory,
loadHistory: loadHistory,
clearAll: clearAll,
validateUUID: validateUUID
};
})();

<nav style={{borderBottom:'1px solid #e8e4dc',padding:'1rem 1.5rem',display:'flex',alignItems:'center',gap:10,background:'#fff',position:'sticky',top:0,zIndex:10}}>
<div onClick={onLogoClick} style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer'}}>

</div>

</div>

);
}

/* ── Settings Screen (раздел 27.9 — удаление данных) ── */
function Settings({onBack,onClearAll,t,lang}){
const sessionId = window.SessionManager.getId();
const[cleared,setCleared]=useState(false);

const handleClear=()=>{
if(window.confirm(t('clearDataConfirm'))){
window.SessionManager.clearAll();
setCleared(true);
setTimeout(()=>onClearAll(),1200);
}
};

return(
<div className="fade" style={{maxWidth:420,margin:'0 auto',padding:'2.5rem 1.5rem'}}>
<Btn onClick={onBack} variant="ghost">{t('back')}</Btn>
<h2 style={{fontSize:22,fontWeight:400,margin:'12px 0 20px'}}>{t('settingsTitle')}</h2>

{/* Информация о сессии */}
<Card style={{marginBottom:'1rem'}}>
<Lbl>{t('sessionId')}</Lbl>
<div style={{fontSize:11,color:'#888880',wordBreak:'break-all',fontFamily:'monospace',background:'#f5f2eb',borderRadius:6,padding:'8px 10px',lineHeight:1.6}}>{sessionId}</div>
<div style={{marginTop:10,fontSize:12,color:'#aaa8a0',display:'flex',alignItems:'flex-start',gap:6}}>
<span>🔒</span>
<span>{t('sessionInfo')}</span>
</div>
</Card>

{/* Удаление данных */}
<Card style={{marginBottom:'1rem',border:'1px solid #f48fb1'}}>
<Lbl style={{color:'#b71c1c'}}>{t('clearData')}</Lbl>
<p style={{fontSize:13,color:'#555550',lineHeight:1.6,marginBottom:'1rem'}}>{t('clearDataConfirm')}</p>
{cleared
?<div style={{fontSize:13,color:'#2e7d32',background:'#e8f5e9',borderRadius:6,padding:'8px 12px'}}>{t('clearDataDone')}</div>
:<Btn onClick={handleClear} variant="danger" full>{t('clearData')}</Btn>
}
</Card>
</div>
);
}

function PhotoScreen({onDetected,onBack,setErr,t,lang}){
const{imgObj,converting,fileErr,load}=useFileLoader(t,lang);
const[loading,setLoading]=useState(false);

const detect=async()=>{
if(!imgObj)return;setLoading(true);
try{const r=await window.detectColorType(imgObj);onDetected(r);}
catch(e){setErr(t('detectionFailed'));}
setLoading(false);
};

return(
<div className="fade" style={{maxWidth:420,margin:'0 auto',padding:'2.5rem 1.5rem'}}>
<Btn onClick={onBack} variant="ghost">{t('back')}</Btn>
<h2 style={{fontSize:22,fontWeight:400,margin:'12px 0 6px'}}>{t('uploadPhotoTitle')}</h2>
<p style={{fontSize:13,color:'#888880',marginBottom:'0.5rem',lineHeight:1.5}}>{t('uploadPhotoDesc')}</p>
<div style={{background:'#f5f2eb',borderRadius:8,padding:'8px 12px',fontSize:12,color:'#888880',marginBottom:'0.5rem'}}>{t('photoTip')}</div>
<div style={{background:'#f0f4fa',borderRadius:8,padding:'8px 12px',fontSize:12,color:'#7A96B8',marginBottom:'1rem',display:'flex',alignItems:'center',gap:6}}>
<span>📱</span><span>JPG · PNG · HEIC — {t('uploadSelfieHintConvert')}</span>
</div>
<Drop onSelect={load} preview={imgObj&&imgObj.preview} label={t('uploadSelfie')} sub="JPG · PNG · HEIC" converting={converting}/>

<div style={{marginTop:'1rem'}}>
<Btn onClick={detect} full disabled={!imgObj||loading||!!converting}>{loading?<span><Spin/>&nbsp;{t('detecting')}</span>:t('detectBtn')}</Btn>

);
}

<Lbl>{t('seasonProfile')}</Lbl>

<div style={{marginBottom:'0.75rem'}}>
<div style={{fontSize:11,color:'#aaa8a0',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:6}}>{t('seasonKeywords')}</div>

function Result({result,preview,season,onBack,t,s,lang}){
const ss=window.SEASONS[season];
const colorName=window.COLOR_NAMES[result.color_key]?s(window.COLOR_NAMES[result.color_key]):result.color_key;
const colorNameCap=colorName.charAt(0).toUpperCase()+colorName.slice(1);
const seasonName=s(result.season_name),tempLocal=t(result.color_temperature),satLocal=t(result.saturation);
const bestColors=s(result.season_best)||'';
const explanations={fits:lang==='ru'?`${colorNameCap} прекрасно вписывается в палитру «${seasonName}» — ${tempLocal} температура и ${satLocal} насыщенность подчёркивают вашу внешность.`:`${colorNameCap} sits beautifully within your ${seasonName} palette — the ${tempLocal} temperature and ${satLocal} saturation complement your natural coloring.`,neutral:lang==='ru'?`${colorNameCap} — рабочий выбор для типа «${seasonName}», но не в идеальном диапазоне. Добавьте акценты своей палитры.`:`${colorNameCap} is workable for your ${seasonName} type, though not ideal. Pair with your signature colors.`,not_fits:lang==='ru'?`${colorNameCap} конфликтует с палитрой «${seasonName}». ${tempLocal} температура работает против вашей внешности.`:`${colorNameCap} clashes with your ${seasonName} palette. The ${tempLocal} temperature works against your coloring.`};
const recommendations={fits:lang==='ru'?'Носите как основной предмет — он подчёркивает вашу естественную красоту.':'Wear as a main piece — it enhances your natural glow.',neutral:lang==='ru'?`Используйте как базу, добавив аксессуары палитры «${seasonName}».`:`Use as a base and add ${seasonName}-palette accessories.`,not_fits:lang==='ru'?`Попробуйте заменить на: ${bestColors.split(',').slice(0,2).join(' или ')}.`:`Try replacing with: ${bestColors.split(',').slice(0,2).join(' or ')}.`};
return(
<div className="fade" style={{maxWidth:480,margin:'0 auto',padding:'2rem 1.5rem'}}>
<div style={{marginBottom:'1rem'}}><Btn onClick={onBack} variant="ghost">{t('toDashboard')}</Btn></div>
<div style={{display:'grid',gridTemplateColumns:'100px 1fr',gap:'1rem',marginBottom:'1.5rem',alignItems:'start'}}>
<img src={preview} style={{width:'100%',aspectRatio:'3/4',objectFit:'cover',borderRadius:8,border:'1px solid #e8e4dc'}}/>
<div>
<div style={{marginBottom:10}}><Chip verdict={result.verdict} t={t}/></div>
<div style={{fontSize:16,fontWeight:400,marginBottom:4,color:'#1a1a18',textTransform:'capitalize'}}>{colorName}</div>
<div style={{fontSize:11,color:'#888880',marginBottom:'0.75rem',textTransform:'capitalize',lineHeight:1.6}}>{s(result.category)} · {t(result.color_temperature)} · {t(result.brightness)} · {t(result.saturation)}</div>
<Score n={result.color_match_score} t={t}/>
</div>
</div>
<div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:'1.25rem'}}>
{[[t('analysisLabel'),explanations[result.verdict]],[t('recommendLabel'),recommendations[result.verdict]]].map(([label,text])=>(
<Card key={label}><Lbl>{label}</Lbl><div style={{fontSize:13,lineHeight:1.7,color:'#555550',fontStyle:label===t('analysisLabel')?'italic':'normal'}}>{text}</div></Card>
))}
<Card style={{background:ss.bg,border:'1px solid '+ss.accent+'30'}}>
<Lbl>{t('yourPalette')} — {s(ss.name)}</Lbl>
<div style={{display:'flex',gap:8,flexWrap:'wrap'}}>{ss.swatches.map(c=><div key={c} style={{width:28,height:28,borderRadius:5,background:c}}/>)}</div>
</Card>
</div>
<Btn onClick={onBack} full>{t('analyzeAnother')}</Btn>
</div>
);
}

function History({history,onBack,onClear,t,s}){
return(
<div className="fade" style={{maxWidth:480,margin:'0 auto',padding:'2rem 1.5rem'}}>
<div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.5rem'}}>
<div><Btn onClick={onBack} variant="ghost">{t('back')}</Btn><h2 style={{fontSize:22,fontWeight:400,marginTop:8}}>{t('historyTitle')}</h2></div>
{history.length>0&&<Btn onClick={onClear} variant="secondary" small>{t('clearAll')}</Btn>}
</div>
{history.length===0
?<div style={{textAlign:'center',padding:'4rem',color:'#aaa',fontSize:14,fontStyle:'italic'}}>{t('noHistory')}</div>
:<div style={{display:'flex',flexDirection:'column',gap:10}}>
{history.map(item=>{
const colorName=window.COLOR_NAMES[item.result.color_key]?s(window.COLOR_NAMES[item.result.color_key]):item.result.color_key;
return(<Card key={item.id} style={{display:'grid',gridTemplateColumns:'56px 1fr auto',gap:12,alignItems:'center'}}>
<img src={item.preview} style={{width:'100%',aspectRatio:'1',objectFit:'cover',borderRadius:5,border:'1px solid #e8e4dc'}}/>
<div>
<div style={{fontSize:14,fontWeight:400,marginBottom:2,color:'#1a1a18',textTransform:'capitalize'}}>{colorName}</div>
<div style={{fontSize:11,color:'#888880',marginBottom:6,textTransform:'capitalize'}}>{s(item.result.category)}</div>
<Score n={item.result.color_match_score} t={t}/>
</div>
<Chip verdict={item.result.verdict} t={t}/>
</Card>);
})}
</div>
}
</div>
);
}

/* ── APP ── */
function App(){
const{lang,t,s}=useLang();

/* Инициализация сессии и загрузка сохранённых данных */
const sessionId = window.SessionManager.init();
const savedProfile = window.SessionManager.loadProfile();
const savedHistory = window.SessionManager.loadHistory();

const[screen,setScreen]=useState(savedProfile?'home':'welcome');
const[season,setSeason]=useState(savedProfile?savedProfile.season_id:null);
const[history,setHistory]=useState(savedHistory);
const[result,setResult]=useState(null);
const[preview,setPreview]=useState(null);
const[detection,setDetection]=useState(null);
const[err,setErr]=useState(null);

const goHome=()=>setScreen(season?'home':'welcome');
const go=sc=>()=>setScreen(sc);

const analyze=async(imgObj,prev)=>{
setPreview(prev);setErr(null);setScreen('analyzing');
try{
const r=await window.analyzeClothing(imgObj,season);
setResult(r);
const newHistory=[{result:r,preview:prev,id:Date.now(),session_id:sessionId},...history];
setHistory(newHistory);
window.SessionManager.saveHistory(newHistory);
setScreen('result');
}catch(e){setErr(t('analysisFailed'));setScreen('analyze');}
};

const confirmSeason=sc=>{
setSeason(sc);
window.SessionManager.saveProfile(sc);
setScreen('home');
};

const handleClearAll=()=>{
setSeason(null);
setHistory([]);
setResult(null);
setDetection(null);
setScreen('welcome');
};

return(
<>
<Nav season={season} onLogoClick={goHome} onSeasonClick={go('setup')} onSettings={go('settings')} t={t} s={s}/>
{err&&(
<div style={{background:'#fce4ec',border:'1px solid #f48fb1',borderRadius:8,padding:'10px 16px',margin:'1rem 1.5rem',fontSize:13,color:'#b71c1c',display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
<span style={{lineHeight:1.5}}>{err}</span>
<span style={{cursor:'pointer',flexShrink:0}} onClick={()=>setErr(null)}>×</span>
</div>
)}
{screen==='welcome' &&<Welcome onStart={go('setup')} t={t}/>}
{screen==='home' &&season&&<HomePage season={season} history={history} onAnalyze={go('analyze')} onHistory={go('history')} onChangeType={go('setup')} t={t} s={s}/>}
{screen==='setup' &&<Setup onManual={go('manual')} onPhoto={go('photo')} onBack={goHome} t={t}/>}
{screen==='manual' &&<ManualSelect onSelect={confirmSeason} onBack={go('setup')} t={t} s={s}/>}
{screen==='photo' &&<PhotoScreen onDetected={d=>{setDetection(d);setScreen('detected');}} onBack={go('setup')} setErr={setErr} t={t} lang={lang}/>}
{screen==='detected' &&detection&&<Detected d={detection} onConfirm={confirmSeason} onOverride={go('manual')} onBack={go('setup')} t={t} s={s}/>}
{screen==='analyze' &&season&&<AnalyzePage season={season} onAnalyze={analyze} onBack={goHome} t={t} s={s} lang={lang}/>}
{screen==='analyzing'&&<Analyzing t={t}/>}
{screen==='result' &&result&&<Result result={result} preview={preview} season={season} onBack={go('analyze')} t={t} s={s} lang={lang}/>}
{screen==='history' &&<History history={history} onBack={goHome} onClear={()=>{const h=[];setHistory(h);window.SessionManager.saveHistory(h);setScreen('home');}} t={t} s={s}/>}
{screen==='settings' &&<Settings onBack={goHome} onClearAll={handleClearAll} t={t} lang={lang}/>}
</>
);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
