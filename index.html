<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Georgia',serif;background:#fafaf8;color:#1a1a18;min-height:100vh}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn 0.3s ease}
button{font-family:'Georgia',serif}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#f0ede6}
::-webkit-scrollbar-thumb{background:#c8c4bc;border-radius:2px}
#lang-switcher{position:fixed;bottom:20px;right:20px;z-index:1000;display:flex;gap:4px;background:#fff;border:1px solid #e8e4dc;border-radius:8px;padding:4px;box-shadow:0 2px 12px rgba(0,0,0,0.08)}
#lang-switcher button{border:none;background:transparent;padding:5px 10px;font-size:12px;cursor:pointer;border-radius:5px;font-family:'Georgia',serif;color:#888880;transition:all 0.15s}
#lang-switcher button.active{background:#1a1a18;color:#fafaf8}
@media(max-width:480px){.mobile-stack{flex-direction:column!important;align-items:flex-start!important}.mobile-full{width:100%!important}}
</style>
</head>
<body>
<div id="root"></div>
<div id="lang-switcher">
<button id="btn-ru" onclick="window.setLang('ru')">РУС</button>
<button id="btn-en" onclick="window.setLang('en')">ENG</button>
</div>

<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

/* ── Lang hook ── */
function useLang(){
const[lang,setLang]=useState(window.LANG);
useEffect(()=>{window.__langCallback=setLang;return()=>{window.__langCallback=null;};},[]);
const t=k=>window.T[lang][k]||window.T['ru'][k]||k;
const s=o=>typeof o==='object'&&o!==null?(o[lang]||o['ru']):o;
return{lang,t,s};
}

/* ── PWA hooks ── */
function usePWA(){
const[installable,setInstallable]=useState(!!window._pwaInstallPrompt);
const[installed,setInstalled]=useState(window.isPWAStandalone&&window.isPWAStandalone());
const[updateReady,setUpdateReady]=useState(false);
const[isOnline,setIsOnline]=useState(navigator.onLine);

useEffect(()=>{
const onInstallable=()=>setInstallable(true);
const onInstalled=()=>{setInstalled(true);setInstallable(false);};
const onUpdate=()=>setUpdateReady(true);
const onOnline=()=>setIsOnline(true);
const onOffline=()=>setIsOnline(false);
window.addEventListener('pwa-installable',onInstallable);
window.addEventListener('pwa-installed',onInstalled);
window.addEventListener('sw-update-available',onUpdate);
window.addEventListener('online',onOnline);
window.addEventListener('offline',onOffline);
return()=>{
window.removeEventListener('pwa-installable',onInstallable);
window.removeEventListener('pwa-installed',onInstalled);
window.removeEventListener('sw-update-available',onUpdate);
window.removeEventListener('online',onOnline);
window.removeEventListener('offline',onOffline);
};
},[]);

const promptInstall=async()=>{
if(!window._pwaInstallPrompt)return;
window._pwaInstallPrompt.prompt();
const{outcome}=await window._pwaInstallPrompt.userChoice;
if(outcome==='accepted'){window._pwaInstallPrompt=null;setInstallable(false);}
};

const applyUpdate=()=>{
if(window._SW_REGISTRATION&&window._SW_REGISTRATION.waiting){
window._SW_REGISTRATION.waiting.postMessage({type:'SKIP_WAITING'});
}
window.location.reload();
};

return{installable,installed,updateReady,isOnline,promptInstall,applyUpdate};
}

/* ── File loader hook ── */
function useFileLoader(t,lang){
const[imgObj,setImgObj]=useState(null);
const[converting,setConverting]=useState(null);
const[fileErr,setFileErr]=useState(null);
const load=async f=>{
setConverting(null);setFileErr(null);setImgObj(null);
try{
const r=await window.compressImage(f,st=>{
setConverting(st==='converting'?t('convertingHeic'):null);
});
setConverting(null);setImgObj(r);
}catch(e){
setConverting(null);
const code=e.message?e.message.split(':')[0]:'reader';
setFileErr(window.getErrMsg(code,lang||window.LANG));
}
};
return{imgObj,converting,fileErr,load,reset:()=>{setImgObj(null);setFileErr(null);}};
}

function HomePage({season,history,onAnalyze,onHistory,onChangeType,t,s}){
const ss=window.SEASONS[season];
return(
<div className="fade" style={{maxWidth:480,margin:'0 auto',padding:'2rem 1.5rem 5rem'}}>
<div style={{marginBottom:'1.5rem'}}>
<p style={{fontSize:13,color:'#888880',marginBottom:4}}>{t('homeSubtitle')}</p>
<h1 style={{fontSize:28,fontWeight:400,letterSpacing:'-0.02em'}}>{t('homeTitle')}</h1>
</div>
<Card style={{background:ss.bg,border:'2px solid '+ss.accent+'40',marginBottom:'1.25rem',padding:'1.25rem'}}>
<div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:'1rem',flexWrap:'wrap',gap:8}}>
<div><div style={{fontSize:24,fontWeight:400,marginBottom:2}}>{s(ss.name)}</div><div style={{fontSize:13,color:'#888880',fontStyle:'italic'}}>{s(ss.label)}</div></div>
<div style={{display:'flex',gap:6,flexWrap:'wrap',justifyContent:'flex-end'}}>{ss.swatches.map(c=><div key={c} style={{width:22,height:22,borderRadius:4,background:c}}/>)}</div>
</div>
<div style={{fontSize:13,color:'#666660',fontStyle:'italic',marginBottom:'1rem',lineHeight:1.6}}>{s(ss.tagline)}</div>
<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
<div><div style={{fontSize:10,color:'#aaa8a0',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:4}}>{t('homeBestColors')}</div><div style={{fontSize:12,color:'#555550',lineHeight:1.6}}>{s(ss.best)}</div></div>
<div><div style={{fontSize:10,color:'#aaa8a0',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:4}}>{t('homeAvoid')}</div><div style={{fontSize:12,color:'#555550',lineHeight:1.6}}>{s(ss.avoid)}</div></div>
</div>
</Card>
<div style={{display:'flex',flexDirection:'column',gap:10}}>
{[
{ico:'🪄',title:t('homeAnalyze'),desc:t('analyzeDesc'),fn:onAnalyze,dark:false,light:true},
...(history.length>0?[{ico:'🗂',title:t('homeHistory'),desc:history.length+' '+(window.LANG==='ru'?'анализов':'analyses'),fn:onHistory,dark:false}]:[]),
{ico:'🎨',title:t('homeChangeType'),desc:'',fn:onChangeType,dark:false},
].map(item=>(
<button key={item.title} onClick={item.fn} style={{background:item.light?'#EAE6DF':item.dark?'#1a1a18':'#fff',color:item.dark?'#fafaf8':'#1a1a18',border:item.dark||item.light?'none':'1px solid #e8e4dc',borderRadius:10,padding:'1rem 1.25rem',cursor:'pointer',textAlign:'left',display:'flex',alignItems:'center',gap:14,fontFamily:'Georgia,serif',transition:'opacity 0.15s'}}
onMouseEnter={e=>e.currentTarget.style.opacity='0.85'}
onMouseLeave={e=>e.currentTarget.style.opacity='1'}>
<span style={{fontSize:22}}>{item.ico}</span>
<div style={{flex:1}}><div style={{fontSize:15,marginBottom:item.desc?2:0}}>{item.title}</div>{item.desc&&<div style={{fontSize:12,opacity:0.6}}>{item.desc}</div>}</div>
<span style={{fontSize:18,opacity:0.4}}>→</span>
</button>
))}
</div>
</div>
);
}

function Setup({onManual,onPhoto,onBack,t}){
return(
<div className="fade" style={{maxWidth:420,margin:'0 auto',padding:'2.5rem 1.5rem'}}>
<Btn onClick={onBack} variant="ghost">{t('back')}</Btn>
<h2 style={{fontSize:22,fontWeight:400,margin:'12px 0 6px'}}>{t('setupTitle')}</h2>
<p style={{fontSize:13,color:'#888880',marginBottom:'1.5rem',lineHeight:1.6}}>{t('setupDesc')}</p>
{[['📸',t('autoDetect'),t('autoDetectDesc'),onPhoto],['🎨',t('manualSelect'),t('manualSelectDesc'),onManual]].map(([ico,tx,desc,fn])=>(
<button key={tx} onClick={fn} style={{width:'100%',background:'#fff',border:'1px solid #e8e4dc',borderRadius:10,padding:'1.25rem',cursor:'pointer',textAlign:'left',marginBottom:10,display:'flex',gap:14,alignItems:'flex-start',fontFamily:'Georgia,serif'}}>
<span style={{fontSize:22,minWidth:28}}>{ico}</span>
<div><div style={{fontWeight:400,fontSize:15,marginBottom:4,color:'#1a1a18'}}>{tx}</div><div style={{fontSize:12,color:'#888880'}}>{desc}</div></div>

))}
</div>
);
}

function ManualSelect({onSelect,onBack,t,s}){
const[sel,setSel]=useState(null);
const ss=sel?window.SEASONS[sel]:null;
return(
<div className="fade" style={{maxWidth:480,margin:'0 auto',padding:'2.5rem 1.5rem'}}>
<Btn onClick={onBack} variant="ghost">{t('back')}</Btn>
<h2 style={{fontSize:22,fontWeight:400,margin:'12px 0 6px'}}>{t('chooseTypeTitle')}</h2>
<p style={{fontSize:13,color:'#888880',marginBottom:'1.25rem'}}>{t('chooseTypeDesc')}</p>
<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:'1rem'}}>
{Object.values(window.SEASONS).map(season=>(
<button key={season.id} onClick={()=>setSel(season.id)} style={{background:sel===season.id?season.bg:'#fff',border:sel===season.id?'2px solid '+season.accent:'1px solid #e8e4dc',borderRadius:10,padding:'1rem',cursor:'pointer',textAlign:'left',transition:'all 0.15s',fontFamily:'Georgia,serif'}}>
<div style={{fontWeight:400,fontSize:15,marginBottom:2,color:'#1a1a18'}}>{s(season.name)}</div>
<div style={{fontSize:11,color:'#888880',marginBottom:10}}>{s(season.label)}</div>
<div style={{display:'flex',gap:5}}>{season.swatches.slice(0,4).map(c=><div key={c} style={{width:18,height:18,borderRadius:3,background:c}}/>)}</div>
</button>
))}
</div>
{ss&&<Card style={{marginBottom:'1rem',background:ss.bg,border:'1px solid '+ss.accent+'30'}}><div style={{fontStyle:'italic',color:'#555550',marginBottom:4,fontSize:14}}>{s(ss.tagline)}</div><div style={{fontSize:12,color:'#888880'}}>{t('best')}: {s(ss.best)}</div></Card>}
<Btn onClick={()=>sel&&onSelect(sel)} full disabled={!sel}>{t('confirm')} {sel?s(window.SEASONS[sel].name):''} {t('type')}</Btn>
</div>
);
}

function PhotoScreen({onDetected,onBack,setErr,t,lang}){
const{imgObj,converting,fileErr,load}=useFileLoader(t,lang);
const[loading,setLoading]=useState(false);
const detect=async()=>{
if(!imgObj)return;setLoading(true);
try{const r=await window.detectColorType(imgObj);onDetected(r);}
catch(e){setErr(t('detectionFailed'));}
setLoading(false);
};
return(
<div className="fade" style={{maxWidth:420,margin:'0 auto',padding:'2.5rem 1.5rem'}}>
<Btn onClick={onBack} variant="ghost">{t('back')}</Btn>
<h2 style={{fontSize:22,fontWeight:400,margin:'12px 0 6px'}}>{t('uploadPhotoTitle')}</h2>
<p style={{fontSize:13,color:'#888880',marginBottom:'0.5rem',lineHeight:1.5}}>{t('uploadPhotoDesc')}</p>
<div style={{background:'#f5f2eb',borderRadius:8,padding:'8px 12px',fontSize:12,color:'#888880',marginBottom:'0.5rem'}}>{t('photoTip')}</div>
<div style={{background:'#f0f4fa',borderRadius:8,padding:'8px 12px',fontSize:12,color:'#7A96B8',marginBottom:'1rem',display:'flex',alignItems:'center',gap:6}}>
<span>📱</span><span>JPG · PNG · HEIC — {t('uploadSelfieHintConvert')}</span>
</div>
<Drop onSelect={load} preview={imgObj&&imgObj.preview} label={t('uploadSelfie')} sub="JPG · PNG · HEIC" converting={converting}/>
{fileErr&&<div style={{fontSize:12,color:'#b71c1c',marginTop:8,lineHeight:1.5}}>{fileErr}</div>}
<div style={{marginTop:'1rem'}}>
<Btn onClick={detect} full disabled={!imgObj||loading||!!converting}>{loading?<span><Spin/>&nbsp;{t('detecting')}</span>:t('detectBtn')}</Btn>
</div>
</div>
);
}

function Detected({d,onConfirm,onOverride,onBack,t,s}){
const season=window.SEASONS[d.color_type];
const conf=Math.round(d.confidence_score*100);
const loc=v=>({warm:t('warm'),cool:t('cool'),neutral:t('neutral'),light:t('light'),medium:t('medium'),dark:t('dark'),olive:t('olive'),high:t('high'),low:t('low')}[v]||v);
const ls=o=>typeof o==='object'?s(o):o;
return(
<div className="fade" style={{maxWidth:480,margin:'0 auto',padding:'2rem 1.5rem 5rem'}}>
<Btn onClick={onBack} variant="ghost">{t('back')}</Btn>
<Card style={{background:season.bg,border:'1px solid '+season.accent+'40',marginBottom:'1rem',marginTop:'1rem'}}>
<Lbl>{t('detectedType')}</Lbl>
<div style={{fontSize:28,fontWeight:400,marginBottom:4}}>{s(season.name)}</div>
<div style={{fontSize:14,color:'#666660',marginBottom:'1rem',fontStyle:'italic'}}>{s(season.label)} · {s(season.tagline)}</div>
<div style={{display:'flex',gap:8,marginBottom:'1rem',flexWrap:'wrap'}}>{season.swatches.map(c=><div key={c} style={{width:26,height:26,borderRadius:4,background:c}}/>)}</div>
<div style={{display:'flex',alignItems:'center',gap:10}}>
<div style={{flex:1,height:4,background:'#00000015',borderRadius:2,overflow:'hidden'}}><div style={{height:'100%',width:conf+'%',background:season.accent,borderRadius:2}}/></div>
<span style={{fontSize:12,color:'#888880',whiteSpace:'nowrap'}}>{conf}{t('confidence')}</span>
</div>
</Card>
<Card style={{marginBottom:'1rem'}}>
<Lbl>{t('analysisDetails')}</Lbl>
<div style={{fontSize:13,color:'#555550',lineHeight:1.8}}>
<div>{t('skinTone')}: <b style={{fontWeight:400,color:'#1a1a18'}}>{loc(d.skin_tone)}</b> &nbsp;·&nbsp; {t('undertone')}: <b style={{fontWeight:400,color:'#1a1a18'}}>{loc(d.undertone)}</b></div>
<div>{t('hair')}: <b style={{fontWeight:400,color:'#1a1a18'}}>{ls(d.hair_color)}</b> &nbsp;·&nbsp; {t('eyes')}: <b style={{fontWeight:400,color:'#1a1a18'}}>{ls(d.eye_color)}</b></div>
<div>{t('contrast')}: <b style={{fontWeight:400,color:'#1a1a18'}}>{loc(d.contrast_level)}</b></div>
</div>
</Card>
<Card style={{marginBottom:'1rem',borderLeft:'3px solid '+season.accent}}>
<Lbl>{t('seasonProfile')}</Lbl>
<p style={{fontSize:13,color:'#444440',lineHeight:1.7,marginBottom:'1rem'}}>{s(season.description)}</p>
<div style={{marginBottom:'0.75rem'}}>
<div style={{fontSize:11,color:'#aaa8a0',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:6}}>{t('seasonKeywords')}</div>
<div style={{display:'flex',flexWrap:'wrap',gap:6}}>{s(season.keywords).map(kw=><span key={kw} style={{background:season.bg,color:season.accent,border:'1px solid '+season.accent+'50',borderRadius:20,padding:'3px 12px',fontSize:12}}>{kw}</span>)}</div>
</div>
<div style={{marginBottom:'0.75rem'}}>
<div style={{fontSize:11,color:'#aaa8a0',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:4}}>{t('seasonMakeup')}</div>
<div style={{fontSize:12,color:'#555550',lineHeight:1.6}}>{s(season.makeup)}</div>
</div>
<div>
<div style={{fontSize:11,color:'#aaa8a0',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:4}}>{t('seasonNeutral')}</div>
<div style={{fontSize:12,color:'#555550',lineHeight:1.6}}>{s(season.neutrals)}</div>
</div>
</Card>
<Card style={{marginBottom:'1rem'}}>
<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
<div><div style={{fontSize:11,color:'#aaa8a0',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:4}}>{t('best')}</div><div style={{fontSize:12,color:'#2e7d32',lineHeight:1.6}}>{s(season.best)}</div></div>
<div><div style={{fontSize:11,color:'#aaa8a0',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:4}}>{t('avoid')}</div><div style={{fontSize:12,color:'#b71c1c',lineHeight:1.6}}>{s(season.avoid)}</div></div>
</div>
</Card>
<div style={{background:'#fff8e1',border:'1px solid #ffe082',borderRadius:8,padding:'8px 12px',fontSize:12,color:'#795548',marginBottom:'1rem'}}>{t('approxWarning')}</div>
<div style={{display:'flex',flexDirection:'column',gap:10}}>
<Btn onClick={()=>onConfirm(d.color_type)} full>{t('confirmType')}</Btn>
<Btn onClick={onOverride} variant="secondary" full>{t('chooseDiff')}</Btn>
</div>
</div>
);
}

function AnalyzePage({season,onAnalyze,onBack,t,s,lang}){
const ss=window.SEASONS[season];
const{imgObj,converting,fileErr,load}=useFileLoader(t,lang);
return(
<div className="fade" style={{maxWidth:480,margin:'0 auto',padding:'2rem 1.5rem'}}>
<Btn onClick={onBack} variant="ghost">{t('back')}</Btn>
<Card style={{background:ss.bg,border:'1px solid '+ss.accent+'30',margin:'1rem 0'}}>
<div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
<div style={{display:'flex',gap:5}}>{ss.swatches.slice(0,5).map(c=><div key={c} style={{width:18,height:18,borderRadius:3,background:c}}/>)}</div>
<div style={{flex:1,minWidth:120}}><span style={{fontSize:14,fontWeight:400}}>{s(ss.name)}</span><span style={{fontSize:12,color:'#888880',marginLeft:6,fontStyle:'italic'}}>{s(ss.label)}</span></div>
</div>
</Card>
<h2 style={{fontSize:20,fontWeight:400,marginBottom:6}}>{t('analyzeTitle')}</h2>
<p style={{fontSize:13,color:'#888880',marginBottom:'0.5rem',lineHeight:1.5}}>{t('analyzeDesc')}</p>
<div style={{background:'#f0f4fa',borderRadius:8,padding:'8px 12px',fontSize:12,color:'#7A96B8',marginBottom:'1rem',display:'flex',alignItems:'center',gap:6}}>
<span>📱</span><span>JPG · PNG · HEIC — {t('uploadSelfieHintConvert')}</span>
</div>
<Drop onSelect={load} preview={imgObj&&imgObj.preview} label={t('uploadClothing')} sub="JPG · PNG · HEIC" converting={converting}/>
{fileErr&&<div style={{fontSize:12,color:'#b71c1c',marginTop:8,lineHeight:1.5}}>{fileErr}</div>}
<div style={{marginTop:'1rem'}}>
<Btn onClick={()=>imgObj&&onAnalyze(imgObj,imgObj.preview)} full disabled={!imgObj||!!converting}>{t('analyzeBtn')}</Btn>
</div>
</div>
);
}

function Analyzing({t}){
return(
<div style={{maxWidth:400,margin:'0 auto',padding:'6rem 1.5rem',textAlign:'center'}}>
<div style={{marginBottom:'1.5rem',display:'flex',justifyContent:'center'}}><Spin/></div>
<div style={{fontSize:18,fontWeight:400,marginBottom:8}}>{t('analyzingTitle')}</div>
<div style={{fontSize:13,color:'#888880',fontStyle:'italic'}}>{t('analyzingDesc')}</div>
</div>
);
}

function Result({result,preview,season,onBack,t,s,lang}){
const ss=window.SEASONS[season];
const colorName=window.COLOR_NAMES[result.color_key]?s(window.COLOR_NAMES[result.color_key]):result.color_key;
const cap=colorName.charAt(0).toUpperCase()+colorName.slice(1);
const sn=s(result.season_name),tl=t(result.color_temperature),sl=t(result.saturation);
const bf=s(result.season_best)||'';
const expl={fits:lang==='ru'?`${cap} прекрасно вписывается в палитру «${sn}» — ${tl} температура и ${sl} насыщенность подчёркивают вашу внешность.`:`${cap} sits beautifully within your ${sn} palette — the ${tl} temperature and ${sl} saturation complement your coloring.`,neutral:lang==='ru'?`${cap} — рабочий выбор для типа «${sn}», не в идеальном диапазоне. Добавьте акценты своей палитры.`:`${cap} is workable for your ${sn} type, though not ideal. Pair with your signature colors.`,not_fits:lang==='ru'?`${cap} конфликтует с палитрой «${sn}». ${tl} температура работает против вашей внешности.`:`${cap} clashes with your ${sn} palette. The ${tl} temperature works against your coloring.`};
const recs={fits:lang==='ru'?'Носите как основной предмет — подчёркивает вашу естественную красоту.':'Wear as a main piece — it enhances your natural glow.',neutral:lang==='ru'?`Используйте как базу, добавив аксессуары палитры «${sn}».`:`Use as a base and add ${sn}-palette accessories.`,not_fits:lang==='ru'?`Попробуйте заменить на: ${bf.split(',').slice(0,2).join(' или ')}.`:`Try replacing with: ${bf.split(',').slice(0,2).join(' or ')}.`};
return(
<div className="fade" style={{maxWidth:480,margin:'0 auto',padding:'2rem 1.5rem'}}>
<div style={{marginBottom:'1rem'}}><Btn onClick={onBack} variant="ghost">{t('toDashboard')}</Btn></div>
<div style={{display:'grid',gridTemplateColumns:'100px 1fr',gap:'1rem',marginBottom:'1.5rem',alignItems:'start'}}>
<img src={preview} style={{width:'100%',aspectRatio:'3/4',objectFit:'cover',borderRadius:8,border:'1px solid #e8e4dc'}}/>
<div>
<div style={{marginBottom:10}}><Chip verdict={result.verdict} t={t}/></div>
<div style={{fontSize:16,fontWeight:400,marginBottom:4,color:'#1a1a18',textTransform:'capitalize'}}>{colorName}</div>
<div style={{fontSize:11,color:'#888880',marginBottom:'0.75rem',textTransform:'capitalize',lineHeight:1.6}}>{s(result.category)} · {t(result.color_temperature)} · {t(result.brightness)} · {t(result.saturation)}</div>
<Score n={result.color_match_score} t={t}/>
</div>
</div>
<div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:'1.25rem'}}>
{[[t('analysisLabel'),expl[result.verdict]],[t('recommendLabel'),recs[result.verdict]]].map(([label,text])=>(
<Card key={label}><Lbl>{label}</Lbl><div style={{fontSize:13,lineHeight:1.7,color:'#555550',fontStyle:label===t('analysisLabel')?'italic':'normal'}}>{text}</div></Card>
))}
<Card style={{background:ss.bg,border:'1px solid '+ss.accent+'30'}}>
<Lbl>{t('yourPalette')} — {s(ss.name)}</Lbl>
<div style={{display:'flex',gap:8,flexWrap:'wrap'}}>{ss.swatches.map(c=><div key={c} style={{width:28,height:28,borderRadius:5,background:c}}/>)}</div>
</Card>
</div>
<Btn onClick={onBack} full>{t('analyzeAnother')}</Btn>
</div>
);
}

function History({history,onBack,onClear,t,s}){
return(
<div className="fade" style={{maxWidth:480,margin:'0 auto',padding:'2rem 1.5rem'}}>
<div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.5rem'}}>
<div><Btn onClick={onBack} variant="ghost">{t('back')}</Btn><h2 style={{fontSize:22,fontWeight:400,marginTop:8}}>{t('historyTitle')}</h2></div>
{history.length>0&&<Btn onClick={onClear} variant="secondary" small>{t('clearAll')}</Btn>}
</div>
{history.length===0
?<div style={{textAlign:'center',padding:'4rem',color:'#aaa',fontSize:14,fontStyle:'italic'}}>{t('noHistory')}</div>
:<div style={{display:'flex',flexDirection:'column',gap:10}}>
{history.map(item=>{
const cn=window.COLOR_NAMES[item.result.color_key]?s(window.COLOR_NAMES[item.result.color_key]):item.result.color_key;
return(<Card key={item.id} style={{display:'grid',gridTemplateColumns:'56px 1fr auto',gap:12,alignItems:'center'}}>
<img src={item.preview} style={{width:'100%',aspectRatio:'1',objectFit:'cover',borderRadius:5,border:'1px solid #e8e4dc'}}/>
<div><div style={{fontSize:14,fontWeight:400,marginBottom:2,color:'#1a1a18',textTransform:'capitalize'}}>{cn}</div><div style={{fontSize:11,color:'#888880',marginBottom:6,textTransform:'capitalize'}}>{s(item.result.category)}</div><Score n={item.result.color_match_score} t={t}/></div>
<Chip verdict={item.result.verdict} t={t}/>
</Card>);
})}
</div>
}
</div>
);
}

function Settings({onBack,onClearAll,t,lang}){
const sid=window.SessionManager.getId();
const[cleared,setCleared]=useState(false);
const handleClear=()=>{
if(window.confirm(t('clearDataConfirm'))){window.SessionManager.clearAll();setCleared(true);setTimeout(()=>onClearAll(),1200);}
};
const appVer='1.0.3';
return(
<div className="fade" style={{maxWidth:420,margin:'0 auto',padding:'2.5rem 1.5rem'}}>
<Btn onClick={onBack} variant="ghost">{t('back')}</Btn>
<h2 style={{fontSize:22,fontWeight:400,margin:'12px 0 20px'}}>{t('settingsTitle')}</h2>
<Card style={{marginBottom:'1rem'}}>
<Lbl>{t('appVersion')}</Lbl>
<div style={{fontSize:13,color:'#555550',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
<span>Chromé</span><span style={{fontFamily:'monospace',background:'#f5f2eb',borderRadius:4,padding:'2px 8px',fontSize:12}}>{appVer}</span>
</div>
</Card>
<Card style={{marginBottom:'1rem'}}>
<Lbl>{t('sessionId')}</Lbl>
<div style={{fontSize:11,color:'#888880',wordBreak:'break-all',fontFamily:'monospace',background:'#f5f2eb',borderRadius:6,padding:'8px 10px',lineHeight:1.6}}>{sid}</div>
<div style={{marginTop:10,fontSize:12,color:'#aaa8a0',display:'flex',alignItems:'flex-start',gap:6}}><span>🔒</span><span>{t('sessionInfo')}</span></div>
</Card>
<Card style={{marginBottom:'1rem',border:'1px solid #f48fb1'}}>
<Lbl>{t('clearData')}</Lbl>
{cleared
?<div style={{fontSize:13,color:'#2e7d32',background:'#e8f5e9',borderRadius:6,padding:'8px 12px'}}>{t('clearDataDone')}</div>
:<Btn onClick={handleClear} variant="danger" full>{t('clearData')}</Btn>
}
</Card>
<div style={{marginTop:'2rem',paddingTop:'1.5rem',borderTop:'1px solid #f0ede6',textAlign:'center',fontSize:13,color:'#6B7280',lineHeight:1.6}}>
{t('footerMade')}{' '}
<a href="https://t.me/telegram" target="_blank" rel="noopener noreferrer" style={{color:'#6B7280',textDecoration:'underline',textDecorationColor:'#c8c4bc',cursor:'pointer'}}>{t('footerContact')} →</a>
</div>
</div>
);
}

/* ── APP ── */
function App(){
const{lang,t,s}=useLang();
const{installable,installed,updateReady,isOnline,promptInstall,applyUpdate}=usePWA();
const[showInstallBanner,setShowInstallBanner]=useState(false);

const savedProfile=window.SessionManager.loadProfile();
const savedHistory=window.SessionManager.loadHistory();

const[screen,setScreen]=useState(savedProfile?'home':'welcome');
const[season,setSeason]=useState(savedProfile?savedProfile.season_id:null);
const[history,setHistory]=useState(savedHistory);
const[result,setResult]=useState(null);
const[preview,setPreview]=useState(null);
const[detection,setDetection]=useState(null);
const[err,setErr]=useState(null);

/* Показываем баннер установки через 10 сек */
useEffect(()=>{
if(installable&&!installed){
const timer=setTimeout(()=>setShowInstallBanner(true),10000);
return()=>clearTimeout(timer);
}
},[installable,installed]);

useEffect(()=>{
if(!installable)setShowInstallBanner(false);
},[installable]);

const goHome=()=>setScreen(season?'home':'welcome');
const go=sc=>()=>setScreen(sc);

const analyze=async(imgObj,prev)=>{
setPreview(prev);setErr(null);setScreen('analyzing');
try{
const r=await window.analyzeClothing(imgObj,season);
setResult(r);
const nh=[{result:r,preview:prev,id:Date.now()},...history];
setHistory(nh);window.SessionManager.saveHistory(nh);
setScreen('result');
}catch(e){setErr(t('analysisFailed'));setScreen('analyze');}
};

const confirmSeason=sc=>{setSeason(sc);window.SessionManager.saveProfile(sc);setScreen('home');};
const handleClearAll=()=>{setSeason(null);setHistory([]);setResult(null);setDetection(null);setScreen('welcome');};

return(
<>
{/* PWA Banners */}
{updateReady&&<UpdateBanner t={t} onUpdate={applyUpdate}/>}
{!isOnline&&<OfflineBadge t={t}/>}
{showInstallBanner&&installable&&!installed&&(
<InstallBanner t={t} onInstall={async()=>{await promptInstall();setShowInstallBanner(false);}} onDismiss={()=>setShowInstallBanner(false)}/>
)}

<Nav season={season} onLogoClick={goHome} onSeasonClick={go('setup')} onSettings={go('settings')} t={t} s={s} isOnline={isOnline} installed={installed}/>

{err&&(
<div style={{background:'#fce4ec',border:'1px solid #f48fb1',borderRadius:8,padding:'10px 16px',margin:'1rem 1.5rem',fontSize:13,color:'#b71c1c',display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
<span style={{lineHeight:1.5}}>{err}</span>
<span style={{cursor:'pointer',flexShrink:0}} onClick={()=>setErr(null)}>×</span>
</div>
)}

{screen==='welcome' &&<Welcome onStart={go('setup')} t={t}/>}
{screen==='home' &&season&&<HomePage season={season} history={history} onAnalyze={go('analyze')} onHistory={go('history')} onChangeType={go('setup')} t={t} s={s}/>}
{screen==='setup' &&<Setup onManual={go('manual')} onPhoto={go('photo')} onBack={goHome} t={t}/>}
{screen==='manual' &&<ManualSelect onSelect={confirmSeason} onBack={go('setup')} t={t} s={s}/>}
{screen==='photo' &&<PhotoScreen onDetected={d=>{setDetection(d);setScreen('detected');}} onBack={go('setup')} setErr={setErr} t={t} lang={lang}/>}
{screen==='detected' &&detection&&<Detected d={detection} onConfirm={confirmSeason} onOverride={go('manual')} onBack={go('setup')} t={t} s={s}/>}
{screen==='analyze' &&season&&<AnalyzePage season={season} onAnalyze={analyze} onBack={goHome} t={t} s={s} lang={lang}/>}
{screen==='analyzing'&&<Analyzing t={t}/>}
{screen==='result' &&result&&<Result result={result} preview={preview} season={season} onBack={go('analyze')} t={t} s={s} lang={lang}/>}
{screen==='history' &&<History history={history} onBack={goHome} onClear={()=>{const h=[];setHistory(h);window.SessionManager.saveHistory(h);setScreen('home');}} t={t} s={s}/>}
{screen==='settings' &&<Settings onBack={goHome} onClearAll={handleClearAll} t={t} lang={lang}/>}
</>
);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
