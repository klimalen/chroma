window.AuthManager=(function(){
  var _user=null;
  var _listeners=[];
  function notify(u){_user=u;_listeners.forEach(function(fn){try{fn(u);}catch(e){}});}
  function onAuthChange(fn){_listeners.push(fn);return function(){_listeners=_listeners.filter(function(l){return l!==fn;});};}
  function init(){
    if(!window._supabase)return;
    window._supabase.auth.getSession().then(function(res){
      _user=(res.data&&res.data.session)?res.data.session.user:null;
      notify(_user);
    });
    window._supabase.auth.onAuthStateChange(function(event,session){
      notify(session?session.user:null);
    });
  }
  function getUser(){return _user;}
  function isLoggedIn(){return !!_user;}
  async function signUp(email,password){
    if(!window._supabase)throw new Error('no_supabase');
    var res=await window._supabase.auth.signUp({email:email,password:password});
    if(res.error)throw res.error;
    return res.data;
  }
  async function signIn(email,password){
    if(!window._supabase)throw new Error('no_supabase');
    var res=await window._supabase.auth.signInWithPassword({email:email,password:password});
    if(res.error)throw res.error;
    return res.data;
  }
  async function signOut(){
    if(!window._supabase)throw new Error('no_supabase');
    var res=await window._supabase.auth.signOut();
    if(res.error)throw res.error;
    _user=null;notify(null);

/* ══════════════════════════════════════════
   DB MANAGER
══════════════════════════════════════════ */
window.DBManager=(function(){
  function sb(){return window._supabase;}

  async function ensureProfile(user){
    if(!sb())return null;
    var sel=await sb().from('users').select('*').eq('id',user.id).single();
    if(sel.data)return sel.data;
    var ins=await sb().from('users').insert({id:user.id,email:user.email,created_at:new Date().toISOString(),has_migrated_local_data:false}).select().single();
    if(ins.error){console.error('ensureProfile error:',ins.error);return null;}
    return ins.data;
  }
  async function loadProfile(userId){
    if(!sb())return null;
    var res=await sb().from('users').select('*').eq('id',userId).single();
    return res.data||null;
  }
  async function updateProfile(userId,fields){
    if(!sb())return;
    await sb().from('users').update(fields).eq('id',userId);
  }
  async function deleteProfile(userId){
    if(!sb())return;
    await sb().from('outfit_analysis_history').delete().eq('user_id',userId);
    await sb().from('color_type_history').delete().eq('user_id',userId);
    await sb().from('users').delete().eq('id',userId);
  }
  async function saveColorType(userId,colorType,source){
    if(!sb())return;
    await sb().from('color_type_history').insert({user_id:userId,color_type:colorType,source:source||'manual',created_at:new Date().toISOString()});
  }
  async function loadOutfitHistory(userId){
    if(!sb())return[];
    var res=await sb().from('outfit_analysis_history').select('*').eq('user_id',userId).order('created_at',{ascending:false});
    return res.data||[];
  }
  async function saveOutfitAnalysis(userId,item){
    if(!sb())return;
    await sb().from('outfit_analysis_history').insert({
      user_id:userId,
      result_status:(item.result&&item.result.verdict)||'neutral',
      result_title:(item.result&&item.result.color_key)||null,
      result_description:item.result?JSON.stringify(item.result):null,
      local_preview_key:'local_'+(item.id||Date.now()),
      created_at:item.created_at||new Date().toISOString()
    });
  }
  async function migrateLocalData(userId,localHistory,profile){
    if(!sb())return;
    if(!localHistory||!localHistory.length)return;
    if(profile&&profile.has_migrated_local_data)return;
    var existing=await sb().from('outfit_analysis_history').select('created_at').eq('user_id',userId);
    var existingDates=new Set((existing.data||[]).map(function(r){return r.created_at;}));
    var toInsert=[];
    for(var i=0;i<localHistory.length;i++){
      var item=localHistory[i];
      var dt=item.created_at||new Date(item.id||Date.now()).toISOString();
      if(existingDates.has(dt))continue;
      toInsert.push({
        user_id:userId,
        result_status:(item.result&&item.result.verdict)||'neutral',
        result_title:(item.result&&item.result.color_key)||null,
        result_description:item.result?JSON.stringify(item.result):null,
        local_preview_key:'local_'+(item.id||i),
        created_at:dt
      });
    }
    if(toInsert.length){
      var ins=await sb().from('outfit_analysis_history').insert(toInsert);
      if(ins.error){console.error('Migration error:',ins.error);throw ins.error;}
    }
    await sb().from('users').update({has_migrated_local_data:true}).eq('id',userId);
  }
  return{ensureProfile:ensureProfile,loadProfile:loadProfile,updateProfile:updateProfile,deleteProfile:deleteProfile,saveColorType:saveColorType,loadOutfitHistory:loadOutfitHistory,saveOutfitAnalysis:saveOutfitAnalysis,migrateLocalData:migrateLocalData};
})();

window.rgbToHsv=function(r,g,b){r/=255;g/=255;b/=255;var max=Math.max(r,g,b),min=Math.min(r,g,b),d=max-min,h=0;if(d!==0){if(max===r)h=((g-b)/d+6)%6;else if(max===g)h=(b-r)/d+2;else h=(r-g)/d+4;h*=60;}return{h:h,s:max===0?0:d/max,v:max};};

/* ── AUTH MODAL ── */
function AuthModal({initialMode,onClose,onSuccess,t}){
const[mode,setMode]=useState(initialMode||'login');
const[email,setEmail]=useState('');
const[password,setPassword]=useState('');
const[loading,setLoading]=useState(false);
const[error,setError]=useState('');
const[infoMsg,setInfoMsg]=useState('');

function validateEmail(e){return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);}
function mapError(err){
const msg=(err.message||'').toLowerCase();
if(msg.includes('invalid login')||msg.includes('invalid credentials'))return t('authErrInvalidCredentials');
if(msg.includes('user not found'))return t('authErrUserNotFound');
if(msg.includes('already registered')||msg.includes('already exists')||msg.includes('duplicate'))return t('authErrEmailTaken');
if(msg.includes('email not confirmed'))return t('authErrSignUpConfirm');
return t('authErrGeneric');
}
async function handleSubmit(e){
e.preventDefault();setError('');setInfoMsg('');
if(!email.trim()){setError(t('authErrEmailRequired'));return;}
if(!validateEmail(email)){setError(t('authErrEmailInvalid'));return;}
if(!password){setError(t('authErrPasswordRequired'));return;}
if(password.length<6){setError(t('authErrPasswordShort'));return;}
setLoading(true);
try{
if(mode==='register'){
const data=await window.AuthManager.signUp(email,password);
if(data&&data.user&&!data.session){setInfoMsg(t('authErrSignUpConfirm'));setLoading(false);return;}
if(data&&data.user){onSuccess(data.user,'register');}
}else{
const data=await window.AuthManager.signIn(email,password);
if(data&&data.user){onSuccess(data.user,'login');}
}
}catch(err){setError(mapError(err));}
setLoading(false);
}
function handleOverlay(e){if(e.target===e.currentTarget)onClose();}
return<div className="modal-overlay" onClick={handleOverlay}>
<div className="modal-box">
<button onClick={onClose} style={{position:'absolute',top:14,right:16,background:'none',border:'none',fontSize:22,cursor:'pointer',color:'#aaa8a0',lineHeight:1}}>×</button>
<h2 style={{fontSize:20,fontWeight:400,marginBottom:'1.25rem',letterSpacing:'-0.01em'}}>{mode==='login'?t('authLoginTitle'):t('authRegisterTitle')}</h2>
{infoMsg&&<div style={{background:'#e8f5e9',border:'1px solid #a5d6a7',borderRadius:8,padding:'10px 14px',fontSize:13,color:'#2e7d32',marginBottom:'1rem',lineHeight:1.5}}>{infoMsg}</div>}
{error&&<div style={{background:'#fce4ec',border:'1px solid #f48fb1',borderRadius:8,padding:'10px 14px',fontSize:13,color:'#b71c1c',marginBottom:'1rem',lineHeight:1.5}}>{error}</div>}
<form onSubmit={handleSubmit} noValidate>
<div style={{marginBottom:'0.875rem'}}>
<label style={{display:'block',fontSize:12,color:'#888880',marginBottom:5,letterSpacing:'0.04em',textTransform:'uppercase'}}>{t('authEmail')}</label>
<input type="email" value={email} onChange={e=>{setEmail(e.target.value);setError('');}} autoComplete="email" style={{width:'100%',border:'1px solid #c8c4bc',borderRadius:7,padding:'10px 12px',fontSize:15,fontFamily:'Georgia,serif',background:'#fafaf8',color:'#1a1a18',outline:'none'}}
onFocus={e=>e.target.style.borderColor='#1a1a18'} onBlur={e=>e.target.style.borderColor='#c8c4bc'}/>
</div>
<div style={{marginBottom:'1.25rem'}}>
<label style={{display:'block',fontSize:12,color:'#888880',marginBottom:5,letterSpacing:'0.04em',textTransform:'uppercase'}}>{t('authPassword')}</label>
<input type="password" value={password} onChange={e=>{setPassword(e.target.value);setError('');}} autoComplete={mode==='register'?'new-password':'current-password'} style={{width:'100%',border:'1px solid #c8c4bc',borderRadius:7,padding:'10px 12px',fontSize:15,fontFamily:'Georgia,serif',background:'#fafaf8',color:'#1a1a18',outline:'none'}}
onFocus={e=>e.target.style.borderColor='#1a1a18'} onBlur={e=>e.target.style.borderColor='#c8c4bc'}/>
</div>
<Btn full disabled={loading} style={{marginBottom:'0.875rem'}}>
{loading?<span style={{display:'flex',alignItems:'center',gap:8}}><Spin/>{mode==='login'?t('authSubmitLogin'):t('authSubmitRegister')}</span>:(mode==='login'?t('authSubmitLogin'):t('authSubmitRegister'))}
</Btn>
</form>
<button onClick={()=>{setMode(mode==='login'?'register':'login');setError('');setInfoMsg('');}} style={{background:'none',border:'none',color:'#888880',fontSize:13,cursor:'pointer',fontFamily:'Georgia,serif',padding:0,textDecoration:'underline',textDecorationColor:'#c8c4bc',width:'100%',textAlign:'center'}}>
{mode==='login'?t('authSwitchToRegister'):t('authSwitchToLogin')}
</button>
</div>
</div>;
}

<Btn onClick={async()=>{window.ymGoal('logout_click');await onLogout();}} variant="secondary" small>{t('authLogout')}</Btn>
<Btn onClick={handleDeleteProfile} variant="danger" small disabled={deletingProfile}>
{deletingProfile?<span style={{display:'flex',alignItems:'center',gap:6}}><Spin/>{t('authDeleteProfile')}</span>:t('authDeleteProfile')}
</Btn>
</div>
</Card>
)}

<Card style={{marginBottom:'1rem'}}><Lbl>{t('appVersion')}</Lbl><div style={{fontSize:13,color:'#555550',display:'flex',alignItems:'center',justifyContent:'space-between'}}><span>Chromé</span><span style={{fontFamily:'monospace',background:'#f5f2eb',borderRadius:4,padding:'2px 8px',fontSize:12}}>1.26.4</span></div></Card>
<Card style={{marginBottom:'1rem'}}><Lbl>{t('sessionId')}</Lbl><div style={{fontSize:11,color:'#888880',wordBreak:'break-all',fontFamily:'monospace',background:'#f5f2eb',borderRadius:6,padding:'8px 10px',lineHeight:1.6}}>{sid}</div><div style={{marginTop:10,fontSize:12,color:'#aaa8a0',display:'flex',alignItems:'flex-start',gap:6}}><span>🔒</span><span>{t('sessionInfo')}</span></div></Card>
<Card style={{marginBottom:'1rem',border:'1px solid #f48fb1'}}><Lbl>{t('clearData')}</Lbl>
{cleared?<div style={{fontSize:13,color:'#2e7d32',background:'#e8f5e9',borderRadius:6,padding:'8px 12px'}}>{t('clearDataDone')}</div>:<Btn onClick={handleClear} variant="danger" full>{t('clearData')}</Btn>}
</Card>
<div style={{marginTop:'2rem',paddingTop:'1.5rem',borderTop:'1px solid #f0ede6',textAlign:'center',fontSize:13,color:'#6B7280',lineHeight:1.6}}>
{t('footerMade')}{' '}<a href="https://klimova-a.tilda.ws/welcome" target="_blank" rel="noopener noreferrer" style={{color:'#6B7280',textDecoration:'underline',textDecorationColor:'#c8c4bc',cursor:'pointer'}}>{t('footerContact')} →</a>
</div>
</div>;
}

/* ══════════════════════════════════════════
   APP ROOT
══════════════════════════════════════════ */
function App(){
const{lang,t,s}=useLang();
const{installable,installed,updateReady,isOnline,promptInstall,applyUpdate}=usePWA();
const{user,authReady}=useAuth();
const[showInstallBanner,setShowInstallBanner]=useState(false);
const[authModal,setAuthModal]=useState(null); // null | 'login' | 'register'
const[migrating,setMigrating]=useState(false);

const savedProfile=window.SessionManager.loadProfile();
const savedHistory=window.SessionManager.loadHistory();

const[screen,setScreen]=useState(savedProfile?'home':'welcome');
const[season,setSeason]=useState(savedProfile?savedProfile.season_id:null);
const[history,setHistory]=useState(savedHistory);
const[result,setResult]=useState(null);
const[preview,setPreview]=useState(null);
const[detection,setDetection]=useState(null);
const[err,setErr]=useState(null);

// PWA install prompt
useEffect(()=>{
if(installable&&!installed){const tm=setTimeout(()=>setShowInstallBanner(true),10000);return()=>clearTimeout(tm);}
},[installable,installed]);
useEffect(()=>{if(!installable)setShowInstallBanner(false);},[installable]);

// Аналитика экранов
useEffect(()=>{
const evts={welcome:'home_view_no_color_type',home:'home_view_with_color_type','season-info':'color_type_page_view',setup:'color_type_change_page_view',manual:'color_type_select_page_view',photo:'selfie_upload_page_view',analyze:'outfit_upload_page_view',result:'outfit_analysis_result_view',history:'history_page_view',settings:'settings_page_view'};
const ev=evts[screen];if(ev)window.ymGoal(ev);
},[screen]);

// После авторизации — создать профиль + мигрировать локальные данные
const handleAuthSuccess=async(authUser,mode)=>{
setAuthModal(null);
window.ymGoal(mode==='register'?'register_success':'login_success');
try{
setMigrating(true);
const profile=await window.DBManager.ensureProfile(authUser);
// Мигрируем локальные данные
const localHistory=window.SessionManager.loadHistory();
if(localHistory&&localHistory.length){
await window.DBManager.migrateLocalData(authUser.id,localHistory,profile);
}
// Если есть локальный цветотип — синхронизируем
const localProfile=window.SessionManager.loadProfile();
if(localProfile&&localProfile.season_id){
await window.DBManager.saveColorType(authUser.id,localProfile.season_id,'local_import');
await window.DBManager.updateProfile(authUser.id,{current_color_type:localProfile.season_id});
}
}catch(e){
console.error('Post-auth sync error:',e);
}finally{
setMigrating(false);
}
};

const handleLogout=async()=>{
try{
await window.AuthManager.signOut();
window.ymGoal('logout_success');
}catch(e){console.error('Logout error:',e);}
};

const handleDeleteProfile=()=>{
setSeason(null);setHistory([]);setResult(null);setDetection(null);
window.SessionManager.clearAll();
setScreen('welcome');
};

const goHome=()=>setScreen(season?'home':'welcome');
const go=sc=>()=>setScreen(sc);

const analyze=async(imgObj,prev)=>{
setPreview(prev);setErr(null);setScreen('analyzing');
try{
const r=await window.analyzeClothing(imgObj,season);
setResult(r);
const newItem={result:r,preview:prev,id:Date.now(),created_at:new Date().toISOString()};
const nh=[newItem,...history];
setHistory(nh);
window.SessionManager.saveHistory(nh);
// Сохраняем на backend если авторизованы
if(user){
window.DBManager.saveOutfitAnalysis(user.id,newItem).catch(e=>console.error('saveOutfitAnalysis:',e));
}
setScreen('result');
}catch(e){setErr(t('analysisFailed'));setScreen('analyze');}
};

const confirmSeason=sc=>{
setSeason(sc);
window.SessionManager.saveProfile(sc);
// Сохраняем на backend если авторизованы
if(user){
window.DBManager.saveColorType(user.id,sc,'manual').catch(e=>console.error('saveColorType:',e));
window.DBManager.updateProfile(user.id,{current_color_type:sc}).catch(e=>console.error('updateProfile:',e));
}
setScreen('home');
};

const handleClearAll=()=>{setSeason(null);setHistory([]);setResult(null);setDetection(null);setScreen('welcome');};

// Ожидаем инициализацию auth перед рендером
if(!authReady){
return<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:12}}>
<Spin/><div style={{fontSize:13,color:'#888880'}}>Chromé</div>
</div>;
}

return<>
{updateReady&&<UpdateBanner t={t} onUpdate={applyUpdate}/>}
{!isOnline&&<OfflineBadge t={t}/>}
{showInstallBanner&&installable&&!installed&&<InstallBanner t={t} onInstall={async()=>{await promptInstall();setShowInstallBanner(false);}} onDismiss={()=>setShowInstallBanner(false)}/>}
{migrating&&<div style={{background:'#f0f4fa',borderBottom:'1px solid #c8d8f0',padding:'8px 1.5rem',fontSize:13,color:'#7A96B8',display:'flex',alignItems:'center',gap:8}}><Spin/>{t('authMigrating')}</div>}

{/* Модальное окно авторизации */}
{authModal&&<AuthModal initialMode={authModal} onClose={()=>setAuthModal(null)} onSuccess={handleAuthSuccess} t={t}/>}

<Nav season={season} onLogoClick={goHome} onSeasonInfoClick={season?go('season-info'):undefined} onSettings={go('settings')} onAuthOpen={m=>setAuthModal(m)} user={user} t={t} s={s} isOnline={isOnline} installed={installed}/>

{err&&<div style={{background:'#fce4ec',border:'1px solid #f48fb1',borderRadius:8,padding:'10px 16px',margin:'1rem 1.5rem',fontSize:13,color:'#b71c1c',display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}><span style={{lineHeight:1.5}}>{err}</span><span style={{cursor:'pointer',flexShrink:0}} onClick={()=>setErr(null)}>×</span></div>}

{screen==='welcome'&&<Welcome onStart={go('setup')} t={t}/>}
{screen==='home'&&season&&<HomePage season={season} history={history} onAnalyze={go('analyze')} onHistory={go('history')} onChangeType={go('setup')} onSeasonInfo={go('season-info')} t={t} s={s}/>}
{screen==='season-info'&&season&&<SeasonInfo seasonId={season} onBack={goHome} t={t} s={s}/>}
{screen==='setup'&&<Setup onManual={go('manual')} onPhoto={go('photo')} onBack={goHome} t={t}/>}
{screen==='manual'&&<ManualSelect onSelect={confirmSeason} onBack={go('setup')} t={t} s={s}/>}
{screen==='photo'&&<PhotoScreen onDetected={d=>{setDetection(d);setScreen('detected');}} onBack={go('setup')} setErr={setErr} t={t} lang={lang}/>}
{screen==='detected'&&detection&&<Detected d={detection} onConfirm={confirmSeason} onOverride={go('manual')} onBack={go('setup')} t={t} s={s}/>}
{screen==='analyze'&&season&&<AnalyzePage season={season} onAnalyze={analyze} onBack={goHome} t={t} s={s} lang={lang}/>}
{screen==='analyzing'&&<Analyzing t={t}/>}
{screen==='result'&&result&&<Result result={result} preview={preview} season={season} onBack={go('analyze')} t={t} s={s} lang={lang}/>}
{screen==='history'&&<History history={history} onBack={goHome} onClear={()=>{const h=[];setHistory(h);window.SessionManager.saveHistory(h);setScreen('home');}} t={t} s={s}/>}
{screen==='settings'&&<Settings onBack={goHome} onClearAll={handleClearAll} onAuthOpen={m=>setAuthModal(m)} user={user} onLogout={handleLogout} onDeleteProfile={handleDeleteProfile} t={t} lang={lang}/>}
</>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
